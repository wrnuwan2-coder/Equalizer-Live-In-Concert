<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Equalizer — ඇරඹුම — Ticket System</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E8192C;--red-dark:#A50F1E;--red-glow:rgba(232,25,44,0.4);
  --silver:#C0C0C0;--silver-light:#E8E8E8;
  --bg:#080808;--card:#111;--card2:#0A0A0A;
  --border:rgba(192,192,192,0.15);--border-red:rgba(232,25,44,0.3);
  --text:#F0F0F0;--text-dim:#888;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 50% 0%,rgba(232,25,44,0.08) 0%,transparent 60%);}
.header{text-align:center;padding:28px 20px 0}
.header-logo{width:110px;height:110px;margin:0 auto 12px;border-radius:50%;background:#000;
  border:2px solid rgba(192,192,192,0.3);box-shadow:0 0 40px rgba(232,25,44,0.3);overflow:hidden}
.header-logo img{width:100%;height:100%;object-fit:cover}
.header h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.8rem,6vw,3.2rem);letter-spacing:4px;
  color:var(--silver-light);text-shadow:0 0 30px rgba(232,25,44,0.5)}
.concert-name{font-family:'DM Serif Display',serif;font-size:clamp(.85rem,2.5vw,1.15rem);
  color:var(--red);letter-spacing:1px;margin-top:4px;font-style:italic}
.event-details{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.event-pill{background:rgba(232,25,44,0.1);border:1px solid var(--border-red);border-radius:20px;
  padding:4px 12px;font-size:12px;color:var(--silver)}
.header .divider{display:flex;align-items:center;gap:10px;justify-content:center;margin:14px 0 0;color:var(--red);opacity:.6}
.header .divider::before,.header .divider::after{content:'';flex:1;max-width:100px;height:1px;background:linear-gradient(to right,transparent,var(--red))}
.header .divider::after{background:linear-gradient(to left,transparent,var(--red))}
.waveform{display:flex;align-items:center;justify-content:center;gap:3px;height:24px;margin:10px 0 0}
.wave-bar{width:3px;border-radius:2px;background:linear-gradient(180deg,var(--red),var(--red-dark));animation:wave 1.2s ease-in-out infinite}
.wave-bar:nth-child(1){height:8px;animation-delay:0s}.wave-bar:nth-child(2){height:16px;animation-delay:.1s}
.wave-bar:nth-child(3){height:22px;animation-delay:.2s}.wave-bar:nth-child(4){height:14px;animation-delay:.3s}
.wave-bar:nth-child(5){height:20px;animation-delay:.15s}.wave-bar:nth-child(6){height:10px;animation-delay:.25s}
.wave-bar:nth-child(7){height:18px;animation-delay:.05s}.wave-bar:nth-child(8){height:12px;animation-delay:.35s}
.wave-bar:nth-child(9){height:22px;animation-delay:.1s}
@keyframes wave{0%,100%{transform:scaleY(0.4)}50%{transform:scaleY(1)}}
.tabs{display:flex;max-width:750px;margin:18px auto 0;padding:0 20px;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 8px;border:none;background:none;color:var(--text-dim);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--red);border-bottom-color:var(--red)}
.tab:hover:not(.active){color:var(--text)}
.main{max-width:750px;margin:0 auto;padding:24px 20px 60px}
.card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.card-title{font-family:'DM Serif Display',serif;font-size:1.05rem;color:var(--silver-light);margin-bottom:18px;display:flex;align-items:center;gap:8px}
.card-title-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.card-title-row .card-title{margin-bottom:0}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:480px){.form-grid{grid-template-columns:1fr}}
.form-full{grid-column:1/-1}
label{display:block;font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.9px;text-transform:uppercase}
input,select{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;
  padding:11px 14px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;
  transition:border-color .2s;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:var(--red);background:rgba(232,25,44,.05)}
select option{background:#111}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;
  border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--red),var(--red-dark));color:#fff;width:100%;
  margin-top:18px;font-size:15px;padding:14px;box-shadow:0 4px 20px var(--red-glow)}
.btn-primary:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 8px 28px var(--red-glow)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:13px;padding:8px 16px}
.btn-outline:hover{border-color:var(--silver);color:var(--silver)}
.btn-danger{background:rgba(192,57,43,.15);border:1px solid rgba(192,57,43,.4);color:#E74C3C;font-size:13px;padding:7px 14px}
.btn-green{background:rgba(39,174,96,.12);border:1px solid rgba(39,174,96,.35);color:#2ECC71;font-size:13px;padding:8px 16px}
.btn-green:hover{background:rgba(39,174,96,.22)}
.btn-blue{background:rgba(41,128,185,.12);border:1px solid rgba(41,128,185,.35);color:#3498DB;font-size:13px;padding:8px 16px}
.btn-blue:hover{background:rgba(41,128,185,.22)}
.btn-sm{padding:7px 14px;font-size:12px}
.ticket{background:linear-gradient(135deg,#0C0C0C,#141414);border:1px solid rgba(192,192,192,0.25);
  border-radius:16px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.8)}
.ticket-header{background:linear-gradient(135deg,#1a1a1a,#0d0d0d);padding:16px 20px;
  display:flex;align-items:center;gap:14px;border-bottom:1px solid rgba(192,192,192,0.1)}
.ticket-header-logo{width:52px;height:52px;border-radius:50%;background:#000;
  border:1px solid rgba(192,192,192,0.3);overflow:hidden;flex-shrink:0}
.ticket-header-logo img{width:100%;height:100%;object-fit:cover}
.ticket-header-text h2{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:3px;color:var(--silver-light)}
.ticket-header-text .sub{font-size:11px;color:var(--red);font-style:italic;font-family:'DM Serif Display',serif;margin-top:2px}
.ticket-badge-wrap{margin-left:auto}
.ticket-body{padding:18px 20px;display:flex;gap:18px;align-items:flex-start}
@media(max-width:480px){.ticket-body{flex-direction:column;align-items:center}}
.ticket-info{flex:1}
.ticket-row{display:flex;flex-direction:column;margin-bottom:12px}
.ticket-label{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--red);opacity:.8}
.ticket-value{font-size:14px;font-weight:500;color:var(--text);margin-top:2px}
.ticket-id{font-family:monospace;font-size:12px;color:var(--silver-light);letter-spacing:2px;
  background:rgba(255,255,255,.06);padding:4px 10px;border-radius:6px;display:inline-block;margin-top:3px}
.ticket-price-tag{display:inline-flex;align-items:center;background:linear-gradient(135deg,var(--red-dark),var(--red));
  color:#fff;font-weight:700;font-size:16px;padding:4px 12px;border-radius:8px;margin-top:3px}
.ticket-footer{padding:10px 20px;background:rgba(0,0,0,.5);display:flex;justify-content:space-between;
  align-items:center;font-size:11px;color:var(--text-dim);border-top:1px solid var(--border)}
.qr-wrap{background:white;padding:10px;border-radius:10px;flex-shrink:0}
.status-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700}
.status-valid{background:rgba(39,174,96,.12);color:#2ECC71;border:1px solid rgba(39,174,96,.3)}
.status-used{background:rgba(232,25,44,.12);color:#E74C3C;border:1px solid rgba(232,25,44,.3)}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor}
.ticket-list-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;
  padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px;transition:border-color .2s}
.ticket-list-item:hover{border-color:rgba(232,25,44,.35)}
.ticket-list-item.checked-in{opacity:.5;background:rgba(232,25,44,.03);border-color:rgba(232,25,44,.15)}
.tli-info{flex:1}.tli-name{font-weight:600;font-size:14px}
.tli-meta{font-size:11px;color:var(--text-dim);margin-top:3px}
.tli-actions{display:flex;gap:7px;flex-wrap:wrap}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
@media(max-width:500px){.stats-grid{grid-template-columns:1fr 1fr}}
.stat-card{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;color:var(--silver-light);letter-spacing:2px}
.stat-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.8px;margin-top:2px}
.scan-mode-toggle{display:flex;background:rgba(0,0,0,.5);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:18px}
.scan-mode-btn{flex:1;padding:11px;border:none;background:none;color:var(--text-dim);font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:6px}
.scan-mode-btn.active{background:linear-gradient(135deg,var(--red-dark),var(--red));color:#fff;font-weight:700}
.scan-box{background:rgba(0,0,0,.4);border:2px dashed var(--border);border-radius:16px;padding:36px 20px;text-align:center;transition:border-color .3s}
.scan-box.active{border-color:var(--red)}
.scan-input{max-width:300px;margin:14px auto 0}
.cam-wrap{position:relative;width:100%;max-width:320px;margin:0 auto;border-radius:14px;overflow:hidden;background:#000;aspect-ratio:1}
.cam-wrap video{width:100%;height:100%;object-fit:cover;display:block}
.cam-overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.cam-frame{width:190px;height:190px;position:relative}
.cam-frame::before,.cam-frame::after{content:'';position:absolute;width:28px;height:28px;border-color:var(--red);border-style:solid}
.cam-frame::before{top:0;left:0;border-width:3px 0 0 3px;border-radius:4px 0 0 0}
.cam-frame::after{bottom:0;right:0;border-width:0 3px 3px 0;border-radius:0 0 4px 0}
.cam-frame-tr,.cam-frame-bl{position:absolute;width:28px;height:28px;border-color:var(--red);border-style:solid}
.cam-frame-tr{top:0;right:0;border-width:3px 3px 0 0;border-radius:0 4px 0 0}
.cam-frame-bl{bottom:0;left:0;border-width:0 0 3px 3px;border-radius:0 0 0 4px}
.cam-scan-line{position:absolute;left:8px;right:8px;height:2px;
  background:linear-gradient(90deg,transparent,var(--red),#ff6b7a,var(--red),transparent);
  animation:scanline 2s ease-in-out infinite;box-shadow:0 0 10px var(--red)}
@keyframes scanline{0%{top:8px;opacity:1}50%{opacity:.7}100%{top:calc(100% - 10px);opacity:1}}
.cam-detected{position:absolute;inset:0;background:rgba(39,174,96,.2);display:flex;align-items:center;justify-content:center;animation:flashG .4s ease}
@keyframes flashG{from{opacity:0}to{opacity:1}}
.cam-error{background:rgba(232,25,44,.08);border:1px solid rgba(232,25,44,.3);border-radius:10px;padding:12px 16px;font-size:13px;color:#E74C3C;margin-top:12px;text-align:center}
.result-box{border-radius:14px;padding:18px 20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;animation:slideIn .3s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.result-success{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.35)}
.result-error{background:rgba(232,25,44,.08);border:1px solid rgba(232,25,44,.35)}
.result-icon{font-size:34px}
.result-title{font-weight:700;font-size:15px}
.result-detail{font-size:12px;color:var(--text-dim);margin-top:3px}
.search-wrap{margin-bottom:14px;position:relative}
.search-wrap input{padding-left:38px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:15px}
.empty{text-align:center;padding:36px;color:var(--text-dim);font-size:13px}
.empty-icon{font-size:36px;margin-bottom:10px}
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:420px;position:relative;overflow:hidden}
.login-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent)}
.login-logo{width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:#000;border:1px solid var(--border);overflow:hidden}
.login-logo img{width:100%;height:100%;object-fit:cover}
.login-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;color:var(--silver-light);text-align:center}
.login-sub{text-align:center;font-size:12px;color:var(--red);margin-bottom:24px;font-style:italic;font-family:'DM Serif Display',serif}
.user-pill{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.03);
  border:1px solid var(--border);border-radius:12px;padding:10px 16px;cursor:pointer;transition:all .2s;width:100%;margin-bottom:8px}
.user-pill:hover{border-color:rgba(232,25,44,.5)}
.user-pill.selected{background:rgba(232,25,44,.1);border-color:var(--red)}
.user-pill-name{font-weight:600;font-size:14px;flex:1}
.role-tag{font-size:10px;background:rgba(232,25,44,.15);color:var(--red);border-radius:4px;padding:2px 7px;letter-spacing:.5px;text-transform:uppercase}
.role-tag.checkin-tag{background:rgba(39,174,96,.12);color:#2ECC71}
.top-bar{display:flex;align-items:center;justify-content:space-between;max-width:750px;margin:0 auto;padding:8px 20px 0;gap:10px;flex-wrap:wrap}
.top-bar .who{font-size:13px;color:var(--text-dim)}
.top-bar .who span{color:var(--silver-light);font-weight:600}
.top-bar-right{display:flex;align-items:center;gap:10px}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:8px;padding:5px 12px;color:var(--text-dim);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s}
.logout-btn:hover{border-color:rgba(232,25,44,.6);color:#E74C3C}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadeIn .2s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-box{background:var(--card2);border:1px solid var(--border);border-radius:20px;padding:26px;width:100%;max-width:540px;max-height:90vh;overflow-y:auto;position:relative}
.modal-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);border-radius:20px 20px 0 0}
.modal-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.06);border:none;color:var(--text-dim);border-radius:50%;width:30px;height:30px;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.modal-close:hover{background:rgba(232,25,44,.3);color:#E74C3C}
.modal-title{font-family:'DM Serif Display',serif;font-size:1.1rem;color:var(--silver-light);margin-bottom:18px}
.print-actions{display:flex;gap:10px;margin-top:18px}
.print-actions .btn{flex:1;margin-top:0}
.user-list-item{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:12px;padding:13px 16px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
.user-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--red-dark),var(--red));display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.user-info{flex:1}
.user-name-row{font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.user-desc{font-size:11px;color:var(--text-dim);margin-top:2px}
.summary-chips{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px}
.chip{background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 16px;flex:1;min-width:90px;text-align:center}
.chip-num{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;display:block}
.chip-label{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.6px}
.filter-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.filter-bar>div{flex:1;min-width:110px}
.progress-wrap{margin:6px 0 14px}
.progress-track{background:rgba(255,255,255,.05);border-radius:8px;height:10px;overflow:hidden}
.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,var(--red-dark),var(--red));transition:width .6s ease}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text-dim);margin-top:5px}
.report-table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{background:rgba(232,25,44,.07)}
thead th{padding:11px 13px;text-align:left;font-size:10px;font-weight:700;letter-spacing:.9px;text-transform:uppercase;color:var(--red);white-space:nowrap;cursor:pointer;user-select:none}
tbody tr{border-top:1px solid rgba(255,255,255,.04);transition:background .15s}
tbody tr:hover{background:rgba(255,255,255,.02)}
tbody td{padding:10px 13px;color:var(--text);font-size:12px}
.td-used{color:#E74C3C}.td-valid{color:#2ECC71}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{
  @page{size:A4;margin:15mm}
  body *{visibility:hidden !important}
  #print-area,#print-area *{visibility:visible !important}
  #print-area{
    position:fixed !important;inset:0 !important;
    display:flex !important;align-items:center !important;justify-content:center !important;
    background:white !important;padding:20px !important;z-index:9999 !important;
  }
  #print-area .ticket{
    max-width:440px !important;width:100% !important;
    border:1.5px solid #ccc !important;box-shadow:none !important;
    background:#fff !important;
    page-break-inside:avoid !important;
    break-inside:avoid !important;
    display:block !important;
  }
  #print-area .ticket-header{
    background:#111 !important;
    -webkit-print-color-adjust:exact;print-color-adjust:exact;
    page-break-after:avoid !important;break-after:avoid !important;
    page-break-inside:avoid !important;break-inside:avoid !important;
  }
  #print-area .ticket-body{
    background:#fff !important;
    page-break-before:avoid !important;break-before:avoid !important;
    page-break-inside:avoid !important;break-inside:avoid !important;
  }
  #print-area .ticket-footer{
    background:#f5f5f5 !important;color:#666 !important;
    page-break-before:avoid !important;break-before:avoid !important;
  }
  #print-area .ticket-header-text h2{color:#fff !important}
  #print-area .ticket-header-text .sub{color:#E8192C !important}
  #print-area .ticket-label{color:#E8192C !important;opacity:1 !important}
  #print-area .ticket-value{color:#111 !important}
  #print-area .ticket-id{color:#333 !important;background:#f5f5f5 !important}
  #print-area .ticket-price-tag{background:#E8192C !important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  #print-area .ticket-header-logo img{width:52px !important;height:52px !important}
  #print-area .qr-wrap{border:1px solid #ddd}

const CONCERT = {
  band:'EQUALIZER', name:'ඇරඹුම — Live In Concert',
  venue:'IVY House, Pembroke', date:'2026-08-22',

};
const FB_URL='https://new-year-festival-2026-malta-default-rtdb.europe-west1.firebasedatabase.app';
const FB_PATH='equalizer_concert';
const DEFAULT_USERS=[
  {id:'u1',name:'Admin',pin:'1234',role:'admin',emoji:'🎸'},

async function fbGet(p){const r=await fetch(`${FB_URL}/${FB_PATH}/${p}.json`);if(!r.ok)throw new Error('GET');return r.json();}
async function fbSet(p,d){const r=await fetch(`${FB_URL}/${FB_PATH}/${p}.json`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error('PUT');return r.json();}
async function fbPatch(p,d){const r=await fetch(`${FB_URL}/${FB_PATH}/${p}.json`,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});if(!r.ok)throw new Error('PATCH');return r.json();}
async function fbDelete(p){await fetch(`${FB_URL}/${FB_PATH}/${p}.json`,{method:'DELETE'});}

function genId(){const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';let id='EQ-';for(let i=0;i<8;i++)id+=c[Math.floor(Math.random()*c.length)];return id;}

function QRImg({data,size=120}){
  const ref=useRef(null);
  useEffect(()=>{if(!ref.current)return;ref.current.innerHTML='';
    try{new window.QRCode(ref.current,{text:data,width:size,height:size,colorDark:'#000',colorLight:'#fff',correctLevel:window.QRCode.CorrectLevel.M})}catch(e){}
  },[data,size]);
  return <div ref={ref}/>;
}

function TicketCard({ticket,size=115}){
  const used=ticket.checkedIn;
  return(
    <div className="ticket">
      <div className="ticket-header">
        <div className="ticket-header-logo"><img src={LOGO} alt="EQ"/></div>
        <div className="ticket-header-text">
          <h2>{CONCERT.band}</h2><div className="sub">{CONCERT.name}</div>
        </div>
        <div className="ticket-badge-wrap">
          <span className={`status-badge ${used?'status-used':'status-valid'}`}>
            <span className="status-dot"/>{used?'USED':'VALID'}
          </span>
        </div>
      </div>
      <div className="ticket-body">
        <div className="ticket-info">
          <div className="ticket-row"><span className="ticket-label">Guest Name</span><span className="ticket-value">{ticket.name}</span></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 16px'}}>
            <div className="ticket-row"><span className="ticket-label">Date</span><span className="ticket-value" style={{fontSize:12}}>{CONCERT.dateDisplay}</span></div>
            <div className="ticket-row"><span className="ticket-label">Time</span><span className="ticket-value">{CONCERT.time}</span></div>
            <div className="ticket-row"><span className="ticket-label">Venue</span><span className="ticket-value" style={{fontSize:12}}>{CONCERT.venue}</span></div>
            <div className="ticket-row"><span className="ticket-label">Price</span><span className="ticket-price-tag">{CONCERT.currency}{CONCERT.price}</span></div>
          </div>
          <div className="ticket-row"><span className="ticket-label">Ticket ID</span><span className="ticket-id">{ticket.id}</span></div>
          {ticket.phone&&<div className="ticket-row"><span className="ticket-label">Phone</span><span className="ticket-value">{ticket.phone}</span></div>}
          {used&&<div className="ticket-row"><span className="ticket-label">Checked In</span><span className="ticket-value" style={{color:'#E74C3C',fontSize:12}}>{ticket.checkedInAt}</span></div>}
        </div>
        <div className="qr-wrap"><QRImg data={ticket.id} size={size}/></div>
      </div>
      <div className="ticket-footer">
        <span>🎸 Present at entry · No re-entry</span>
        <span>{CONCERT.dateDisplay}</span>
      </div>
    </div>
  );
}

function CameraScanner({onScan}){
  const videoRef=useRef(null);const canvasRef=useRef(null);const streamRef=useRef(null);
  const rafRef=useRef(null);const [camErr,setCamErr]=useState('');const [detected,setDetected]=useState(false);
  const lastScan=useRef('');const lastScanTime=useRef(0);
  const onScanRef=useRef(onScan);useEffect(()=>{onScanRef.current=onScan;},[onScan]);
  const tick=useCallback(()=>{
    const video=videoRef.current;const canvas=canvasRef.current;
    if(!video||!canvas||video.readyState!==4){rafRef.current=requestAnimationFrame(tick);return;}
    const ctx=canvas.getContext('2d',{willReadFrequently:true});
    canvas.width=video.videoWidth;canvas.height=video.videoHeight;ctx.drawImage(video,0,0);
    try{
      const img=ctx.getImageData(0,0,canvas.width,canvas.height);
      const code=window.jsQR&&window.jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
      if(code&&code.data){
        const now=Date.now();
        if(code.data!==lastScan.current||now-lastScanTime.current>3000){
          lastScan.current=code.data;lastScanTime.current=now;
          setDetected(true);setTimeout(()=>setDetected(false),600);
          onScanRef.current(code.data);
        }
      }
    }catch(e){}
    rafRef.current=requestAnimationFrame(tick);
  },[]);
  useEffect(()=>{
    let mounted=true;
    const start=async()=>{
      try{
        const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
        if(!mounted){stream.getTracks().forEach(t=>t.stop());return;}
        streamRef.current=stream;
        if(videoRef.current){videoRef.current.srcObject=stream;await videoRef.current.play();}
        rafRef.current=requestAnimationFrame(tick);
      }catch(e){
        if(!mounted)return;
        if(e.name==='NotAllowedError')setCamErr('Camera permission denied. Allow and retry.');
        else if(e.name==='NotFoundError')setCamErr('No camera found.');
        else setCamErr('Camera error: '+e.message);
      }
    };
    start();
    return()=>{mounted=false;cancelAnimationFrame(rafRef.current);streamRef.current?.getTracks().forEach(t=>t.stop());};
  },[tick]);
  if(camErr)return(<div><div className="cam-error">📵 {camErr}</div><div style={{fontSize:12,color:'var(--text-dim)',textAlign:'center',marginTop:8}}>Use HTTPS or localhost · Try Safari/Chrome</div></div>);
  return(
    <div>
      <div className="cam-wrap">
        <video ref={videoRef} playsInline muted style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
        <canvas ref={canvasRef} style={{display:'none'}}/>
        <div className="cam-overlay">
          <div className="cam-frame"><div className="cam-frame-tr"/><div className="cam-frame-bl"/><div className="cam-scan-line"/></div>
        </div>
        {detected&&<div className="cam-detected"><span style={{fontSize:44}}>✅</span></div>}
      </div>
      <div style={{textAlign:'center',fontSize:12,color:'var(--text-dim)',marginTop:8}}>Hold QR inside frame · Auto detect</div>
    </div>
  );
}

          <div className="progress-label"><span>{cc} attended</span><span>{pct}% attendance</span><span>{total-cc} remaining</span></div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12,marginTop:14}}>
          <div style={{background:'rgba(39,174,96,.07)',border:'1px solid rgba(39,174,96,.2)',borderRadius:10,padding:'12px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:'.7px'}}>Collected</div>
            <div style={{fontSize:'1.6rem',fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:'#2ECC71',marginTop:4}}>€{revCollected}</div>
          </div>
          <div style={{background:'rgba(232,25,44,.07)',border:'1px solid rgba(232,25,44,.2)',borderRadius:10,padding:'12px 16px'}}>
            <div style={{fontSize:11,color:'var(--text-dim)',textTransform:'uppercase',letterSpacing:'.7px'}}>Outstanding</div>
            <div style={{fontSize:'1.6rem',fontFamily:"'Bebas Neue',sans-serif",letterSpacing:2,color:'var(--red)',marginTop:4}}>€{revenue-revCollected}</div>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-title-row">
          <div className="card-title">📋 Ticket Details</div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-green btn-sm" onClick={exportCSV}>⬇️ CSV</button>
            <button className="btn btn-blue btn-sm" onClick={printReport}>🖨️ Print</button>
          </div>
        </div>
        <div className="filter-bar">
          <div><label>Status</label>
            <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}>
              <option value="all">All</option><option value="checked">Checked In</option><option value="pending">Pending</option>
            </select>
          </div>
          <div style={{flex:2}}>
            <label>Search</label>
            <div className="search-wrap" style={{marginBottom:0}}>
              <span className="search-icon">🔍</span>
              <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Name, ID, phone..."/>
            </div>
          </div>
        </div>
        <div style={{fontSize:12,color:'var(--text-dim)',marginBottom:10}}>
          Showing <strong style={{color:'var(--red)'}}>{filtered.length}</strong> of {total}
          {(filterStatus!=='all'||search)&&<button onClick={()=>{setFilterStatus('all');setSearch('');}} style={{marginLeft:10,background:'none',border:'none',color:'#E74C3C',fontSize:12,cursor:'pointer',textDecoration:'underline'}}>Clear</button>}
        </div>
        {filtered.length===0?<div className="empty"><div className="empty-icon">🔍</div>No matches</div>:(
          <div className="report-table-wrap">
            <table>
              <thead><tr>
                {[['id','Ticket ID'],['name','Name'],['checkedIn','Status'],['issuedAt','Issued']].map(([col,lbl])=>(
                  <th key={col} onClick={()=>sort(col)}>{lbl} <span style={{opacity:.4}}>{arrow(col)}</span></th>
                ))}
              </tr></thead>
              <tbody>{filtered.map(t=>(
                <tr key={t.id}>
                  <td><span style={{fontFamily:'monospace',fontSize:11,color:'var(--silver-light)',letterSpacing:1}}>{t.id}</span></td>
                  <td><strong>{t.name}</strong>{t.phone&&<div style={{fontSize:10,color:'var(--text-dim)'}}>{t.phone}</div>}</td>
                  <td>{t.checkedIn?<span className="td-used">✅ {t.checkedInAt?.split(',')[1]?.trim()||'Done'}</span>:<span className="td-valid">⏳ Pending</span>}</td>
                  <td style={{color:'var(--text-dim)',fontSize:11}}>{t.issuedAt}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function App(){
  const [user,setUser]=useState(null);const [tab,setTab]=useState('checkin');
  const [tickets,setTickets]=useState([]);const [users,setUsers]=useState(DEFAULT_USERS);
  const [loading,setLoading]=useState(true);const [online,setOnline]=useState(true);
  const [syncMsg,setSyncMsg]=useState('');
  const pollRef=useRef(null);const lastHash=useRef('');
  const showSync=(msg,col='#2ECC71',ms=2000)=>{setSyncMsg({msg,col});setTimeout(()=>setSyncMsg(''),ms);};

  useEffect(()=>{
    (async()=>{
      try{
        const [tData,uData]=await Promise.all([fbGet('tickets'),fbGet('users')]);
        const tArr=tData?Object.values(tData):[];
        const uArr=uData?Object.values(uData):DEFAULT_USERS;
        setTickets(tArr);setUsers(uArr.length?uArr:DEFAULT_USERS);
        lastHash.current=JSON.stringify(tArr);setOnline(true);
      }catch{setOnline(false);}
      finally{setLoading(false);}
    })();
  },[]);

  useEffect(()=>{
    pollRef.current=setInterval(async()=>{
      if(document.hidden)return;
      try{
        const tData=await fbGet('tickets');const tArr=tData?Object.values(tData):[];
        const hash=JSON.stringify(tArr);
        if(hash!==lastHash.current){lastHash.current=hash;setTickets(tArr);}
        setOnline(true);
      }catch{setOnline(false);}
    },4000);
    return()=>clearInterval(pollRef.current);
  },[]);

  const addTicket=useCallback(async ticket=>{
    try{await fbSet(`tickets/${ticket.id}`,ticket);setTickets(p=>[ticket,...p]);showSync('✓ Saved');}
    catch{setOnline(false);showSync('⚠ Offline','#E67E22',4000);setTickets(p=>[ticket,...p]);}
  },[]);
  const checkInTicket=useCallback(async id=>{
    const now=new Date().toLocaleString();
    try{await fbPatch(`tickets/${id}`,{checkedIn:true,checkedInAt:now});}catch{setOnline(false);}
    setTickets(p=>p.map(x=>x.id===id?{...x,checkedIn:true,checkedInAt:now}:x));
  },[]);
  const deleteTicket=useCallback(async id=>{
    try{await fbDelete(`tickets/${id}`);}catch{setOnline(false);}
    setTickets(p=>p.filter(x=>x.id!==id));
  },[]);
  const saveUsers=useCallback(async nu=>{
    setUsers(nu);try{const obj={};nu.forEach(u=>obj[u.id]=u);await fbSet('users',obj);}catch{setOnline(false);}
  },[]);

  if(loading)return(
    <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:16}}>
      <div style={{fontSize:44,animation:'spin 1s linear infinite',color:'var(--red)'}}>✿</div>
      <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:'1.4rem',letterSpacing:3,color:'var(--silver-light)'}}>LOADING...</div>
      <div style={{fontSize:12,color:'var(--text-dim)'}}>Connecting to database...</div>
    </div>
  );
  if(!user)return <LoginScreen users={users} onLogin={u=>{setUser(u);setTab(u.role==='admin'?'admin':'checkin');}}/>;
  const isAdmin=user.role==='admin';
  return(
    <div>
      <div className="header">
        <div className="header-logo"><img src={LOGO} alt="Equalizer"/></div>
        <h1>EQUALIZER</h1>
        <div className="concert-name">ඇරඹුම — Live In Concert</div>
        <div className="event-details">
          <span className="event-pill">📅 Saturday, 22nd August 2026</span>
          <span className="event-pill">📍 IVY House, Pembroke</span>
          <span className="event-pill">🕖 7PM — Midnight</span>
          <span className="event-pill">🎫 €15</span>
        </div>
        <div className="waveform">{[...Array(9)].map((_,i)=><div key={i} className="wave-bar"/>)}</div>
        <div className="divider">🎸</div>
      </div>
      <div className="top-bar">
        <div className="who">{user.emoji} <span>{user.name}</span></div>
        <div className="top-bar-right">
          {syncMsg&&<span style={{fontSize:11,color:syncMsg.col}}>{syncMsg.msg}</span>}
          <span style={{fontSize:11,display:'flex',alignItems:'center',gap:4,color:online?'#2ECC71':'#E74C3C'}}>
            <span style={{width:6,height:6,borderRadius:'50%',background:'currentColor',display:'inline-block'}}/>
            {online?'Live':'Offline'}
          </span>
          <button className="logout-btn" onClick={()=>setUser(null)}>Logout</button>
        </div>
      </div>
      <div className="tabs" style={{marginTop:10}}>
        {isAdmin&&<button className={`tab ${tab==='admin'?'active':''}`} onClick={()=>setTab('admin')}>🎟 Issue</button>}
        <button className={`tab ${tab==='checkin'?'active':''}`} onClick={()=>setTab('checkin')}>✅ Check-In</button>
        {isAdmin&&<button className={`tab ${tab==='report'?'active':''}`} onClick={()=>setTab('report')}>📊 Report</button>}
        {isAdmin&&<button className={`tab ${tab==='users'?'active':''}`} onClick={()=>setTab('users')}>👥 Users</button>}
      </div>
      <div className="main">
        {tab==='admin'&&isAdmin&&<AdminTab tickets={tickets} addTicket={addTicket} deleteTicket={deleteTicket}/>}
        {tab==='checkin'&&<CheckinTab tickets={tickets} checkInTicket={checkInTicket}/>}
        {tab==='report'&&isAdmin&&<ReportTab tickets={tickets}/>}
        {tab==='users'&&isAdmin&&<UsersTab users={users} setUsers={saveUsers}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
